<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="StyleLogin.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
  <header class="header">
        <div class="header__logo">
        <img src="/img/heart.png" class="logo__icon">
        <img src="/img/heart.png" class="logo__icon">
        <img src="/img/heart.png" class="logo__icon">
        <span class="logo__text">Heartz Club</span>
        </div>
    </header>
    
    <form action="javascript:void(0);" method="post">
        <h1>Login</h1>

        <div>
            <label for="email">Email:</label>
            <input type="text" id="email" name="email" required>
        </div>

        <div>
            <label for="senha">Senha:</label>
            <input type="password" id="senha" name="senha" required>
            <p><a href="#">Esqueceu a senha?</a></p>
        </div>

        <button type="button" onclick="logar()">Entrar</button>
        <p><a href="/cadastro/cadastro.html">Não tem conta? <br> Criar conta!</a></p>
    </form>
    <footer>

    </footer>
    <script src="script.js"></script>
</body>
</html>

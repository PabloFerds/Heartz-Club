<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esqueci Minha Senha</title>
    
    <link rel="stylesheet" href="esqueceu_senha.css">
    <link rel="stylesheet" href="/Heartz-Club/cabecalho/cabecalhoMenor.css">


    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
    <div id="header"></div>

    <div class="container">
        <h2>Esqueci a Senha</h2>
        <p>Digite o seu e-mail abaixo. Enviaremos as instruções para você redefinir sua senha.</p>
        
        <form id="formRecuperacao">
            <div class="form-group">
                <label for="email">E-mail Cadastrado</label>
                <!-- type="email" já força o navegador a validar se tem '@' -->
                <input type="email" id="email" name="email" placeholder="seu-email@exemplo.com" required>
            </div>
            <button type="submit">Enviar Link de Recuperação</button>
        </form>

        <a href="/Heartz-Club/login/login.html" class="voltar-login">Voltar para o Login</a>
    </div>

    <script src="/Heartz-Club/cabecalho/inserirCabealhoMenor.js"></script>
</body>
</html>

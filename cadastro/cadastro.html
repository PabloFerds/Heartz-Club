<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="styleCadastro.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&family=Press+Start+2P&display=swap"
        rel="stylesheet">
</head>

<body>
    <header class="header">
        <div class="header__logo">
        <img src="/img/heart.png" class="logo__icon">
        <img src="/img/heart.png" class="logo__icon">
        <img src="/img/heart.png" class="logo__icon">
        <span class="logo__text">Heartz Club</span>
        </div>
    </header>

    <form action="javascript:void(0);" method="post">
        <h1>Cadastro</h1>

        <div>
            <label for="Nome">Nome:</label>
            <input type="text" id="Nome" name="Nome" required>
        </div>

        <div>
            <label for="Email">Email:</label>
            <input type="email" id="Email" name="Email" required>
        </div>

        <div>
            <label for="Idade">Idade:</label>
            <input type="number" id="Idade" name="Idade" required>
        </div>

        <div>
            <label for="CPF">CPF:</label>
            <input type="text" id="CPF" name="CPF" required>
        </div>

        <div>
            <label for="Endereço">Endereço:</label>
            <input type="text" id="Endereco" name="Endereco" required>
        </div>

        <div>
            <label for="Senha">Senha:</label>
            <input type="text" id="Senha" name="Senha" required>
        </div>
        <div>
            <label for="Confirmar">Confirmar Senha:</label>
            <input type="text" id="Confirmar" name="Confirmar" required>
        </div>

        <button type="button" onclick="cadastrar()">Cadastrar</button>
    </form>
    <footer>

    </footer>
    <script src="script.js"></script>
</body>

</html>
